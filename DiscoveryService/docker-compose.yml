version: '3.8'

services:
  discoveryservice:
    image: stargazingsparrow/discoveryservice:latest
    container_name: discoveryservice
    environment:
      SERVER_PORT: ${SERVER_PORT}
      EUREKA_INSTANCE_HOSTNAME: ${EUREKA_INSTANCE_HOSTNAME}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_SERVICE_URL}
      EUREKA_CLIENT_REGISTER-WITH-EUREKA: "false"
      EUREKA_CLIENT_FETCH-REGISTRY: "false"
    networks:
      - app-network

networks:
  app-network:
    external: true