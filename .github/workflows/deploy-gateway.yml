name: Deploy Gateway

on:
  push:
    branches:  [main-docker-compose-disabled]
    paths: ['Gateway/**']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v3

      # ── 2. Java 21 ───────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Build ─────────────────────────────────────────────────
      - name: Build JAR
        run: cd Gateway && mvn clean package -DskipTests

      - name: List target folder
        run: ls Gateway/target/

      # ── 4. Docker build & push ───────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./Gateway
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/gateway:latest

      # ── 5. Copy docker-compose to VPS ────────────────────────────
      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "Gateway/docker-compose.yml"
          target: "~/services/gateway"
          strip_components: 1

      # ── 6. Write .env, pull image, restart ───────────────────────
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/services/gateway

            printf '%s\n' \
              "SERVER_PORT=${{ secrets.GATEWAY_SERVER_PORT }}" \
              "EUREKA=${{ secrets.GATEWAY_EUREKA_URL }}" \
              "EUREKA_INSTANCE_HOSTNAME=${{ secrets.GATEWAY_EUREKA_HOSTNAME }}" \
              "REDIS_HOST=${{ secrets.GATEWAY_REDIS_HOST }}" \
              "REDIS_PORT=${{ secrets.GATEWAY_REDIS_PORT }}" \
              "OAUTH2_CLIENT_ID=${{ secrets.GATEWAY_OAUTH2_CLIENT_ID }}" \
              "OAUTH2_CLIENT_SECRET=${{ secrets.GATEWAY_OAUTH2_CLIENT_SECRET }}" \
              "OAUTH2_REDIRECT_URI=${{ secrets.GATEWAY_OAUTH2_REDIRECT_URI }}" \
              "OAUTH2_ISSUER_URI=${{ secrets.GATEWAY_OAUTH2_ISSUER_URI }}" \
              "OAUTH2_AUTH_URI=${{ secrets.GATEWAY_OAUTH2_AUTH_URI }}" \
              "OAUTH2_TOKEN_URI=${{ secrets.GATEWAY_OAUTH2_TOKEN_URI }}" \
              > .env

            chmod 600 .env

            docker pull stargazingsparrow/gateway:latest
            docker-compose down
            docker-compose up -d