name: Deploy ProductService

on:
  push:
    branches: [main]
    paths: ['ProductService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v3

      # ── 2. Java 21 ───────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Build ─────────────────────────────────────────────────
      - name: Build JAR
        run: cd ProductService && mvn clean package -DskipTests

      - name: List target folder
        run: ls ProductService/target/

      # ── 4. Docker build & push ───────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./ProductService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/productservice:latest

      # ── 5. Copy docker-compose to VPS ────────────────────────────
      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "ProductService/docker-compose.yml"
          target: "~/services/productservice"
          strip_components: 1

      # ── 6. Write .env, pull image, restart ───────────────────────
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/services/productservice

            printf '%s\n' \
              "SERVER_PORT=${{ secrets.PRODUCTSERVICE_SERVER_PORT }}" \
              "SPRING_DATASOURCE_URL=${{ secrets.PRODUCTSERVICE_DATASOURCE_URL }}" \
              "SPRING_DATASOURCE_USERNAME=${{ secrets.PRODUCTSERVICE_DATASOURCE_USERNAME }}" \
              "SPRING_DATASOURCE_PASSWORD=${{ secrets.PRODUCTSERVICE_DATASOURCE_PASSWORD }}" \
              "RESOURCE_SERVER=${{ secrets.PRODUCTSERVICE_RESOURCE_SERVER }}" \
              "JWK_URI=${{ secrets.PRODUCTSERVICE_JWK_URI }}" \
              "EUREKA=${{ secrets.PRODUCTSERVICE_EUREKA_URL }}" \
              "EUREKA_INSTANCE_HOSTNAME=${{ secrets.PRODUCTSERVICE_EUREKA_HOSTNAME }}" \
              "ELASTIC_SEARCH_URI=${{ secrets.PRODUCTSERVICE_ELASTIC_SEARCH_URI }}" \
              "REDIS_HOST=${{ secrets.PRODUCTSERVICE_REDIS_HOST }}" \
              "REDIS_PORT=${{ secrets.PRODUCTSERVICE_REDIS_PORT }}" \
              > .env

            chmod 600 .env

            docker pull stargazingsparrow/productservice:latest
            docker-compose down
            docker-compose up -d