# ════════════════════════════════════════════════════════════════
# deploy-cartservice-K8s.yml
# ════════════════════════════════════════════════════════════════
name: Deploy CartService K8s

on:
  push:
    branches: [main]
    paths: ['CartService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: cd CartService && mvn clean package -DskipTests

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./CartService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/cartservice:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Sync secrets to k8s
        run: |
          kubectl create secret generic cartservice-secrets \
            --from-literal=db-username=${{ secrets.CARTSERVICE_DATASOURCE_USERNAME }} \
            --from-literal=db-password=${{ secrets.CARTSERVICE_DATASOURCE_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to k8s
        run: |
          kubectl apply -f k8s/cartservice.yaml
          kubectl set image deployment/cartservice \
            cartservice=stargazingsparrow/cartservice:${{ github.sha }}
          kubectl rollout status deployment/cartservice --timeout=120s
