name: Deploy NotificationService

on:
  push:
    branches:  [main-docker-compose-disabled]
    paths: ['NotificationService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build JAR
        run: cd NotificationService && mvn clean package -DskipTests
      - name: List target folder
        run: ls NotificationService/target/
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./NotificationService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/notificationservice:latest
      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "NotificationService/docker-compose.yml"
          target: "~/services/notificationservice"
          strip_components: 1
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/services/notificationservice
            printf '%s\n' \
              "SERVER_PORT=${{ secrets.NOTIFICATIONSERVICE_SERVER_PORT }}" \
              "EUREKA=${{ secrets.NOTIFICATIONSERVICE_EUREKA_URL }}" \
              "EUREKA_INSTANCE_HOSTNAME=${{ secrets.NOTIFICATIONSERVICE_EUREKA_HOSTNAME }}" \
              "KAFKA_BOOTSTRAP_SERVERS=${{ secrets.NOTIFICATIONSERVICE_KAFKA_BOOTSTRAP_SERVERS }}" \
              "JWK_URI=${{ secrets.NOTIFICATIONSERVICE_JWK_URI }}" \
              "ISSUER_URI=${{ secrets.NOTIFICATIONSERVICE_ISSUER_URI }}" \
              > .env
            chmod 600 .env
            docker pull stargazingsparrow/notificationservice:latest
            docker-compose down
            docker-compose up -d