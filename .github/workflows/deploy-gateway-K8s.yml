name: Deploy Gateway K8s

on:
  push:
    branches: [main]
    paths: ['Gateway/**']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v3

      # ── 2. Java 21 ───────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Build ─────────────────────────────────────────────────
      - name: Build JAR
        run: cd Gateway && mvn clean package -DskipTests

      - name: List target folder
        run: ls Gateway/target/

      # ── 4. Docker build & push ───────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./Gateway
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/gateway:${{ github.sha }}

      # ── 5. Configure kubectl ─────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── 6. Sync secrets to k8s ───────────────────────────────────
      - name: Sync secrets to k8s
        run: |
          kubectl create secret generic gateway-secrets \
            --from-literal=oauth2-client-id=${{ secrets.GATEWAY_OAUTH2_CLIENT_ID }} \
            --from-literal=oauth2-client-secret=${{ secrets.GATEWAY_OAUTH2_CLIENT_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── 7. Deploy ────────────────────────────────────────────────
      - name: Deploy to k8s
        run: |
          kubectl apply -f k8s/gateway.yaml
          kubectl set image deployment/gateway \
            gateway=stargazingsparrow/gateway:${{ github.sha }}
          kubectl rollout status deployment/gateway --timeout=120s