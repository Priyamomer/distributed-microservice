name: Deploy DiscoveryService

on:
  push:
    branches:  [main-docker-compose-disabled]
    paths: ['DiscoveryService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v3

      # ── 2. Java 21 ───────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Build ─────────────────────────────────────────────────
      - name: Build JAR
        run: cd DiscoveryService && mvn clean package -DskipTests

      - name: List target folder
        run: ls DiscoveryService/target/

      # ── 4. Docker build & push ───────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./DiscoveryService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/discoveryservice:latest

      # ── 5. Copy docker-compose to VPS ────────────────────────────
      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "DiscoveryService/docker-compose.yml"
          target: "~/services/discoveryservice"
          strip_components: 1

      # ── 6. Write .env, pull image, restart ───────────────────────
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/services/discoveryservice

            printf '%s\n' \
              "SERVER_PORT=${{ secrets.DISCOVERYSERVICE_SERVER_PORT }}" \
              "EUREKA_INSTANCE_HOSTNAME=${{ secrets.DISCOVERYSERVICE_EUREKA_HOSTNAME }}" \
              "EUREKA_SERVICE_URL=${{ secrets.DISCOVERYSERVICE_SERVICE_URL }}" \
              > .env

            chmod 600 .env

            docker pull stargazingsparrow/discoveryservice:latest
            docker-compose down
            docker-compose up -d