# ════════════════════════════════════════════════════════════════
# deploy-notificationservice-K8s.yml
# ════════════════════════════════════════════════════════════════
name: Deploy NotificationService K8s

on:
  push:
    branches: [main]
    paths: ['NotificationService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: cd NotificationService && mvn clean package -DskipTests

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./NotificationService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/notificationservice:${{ github.sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to k8s
        run: |
          kubectl apply -f k8s/notificationservice.yaml
          kubectl set image deployment/notificationservice \
            notificationservice=stargazingsparrow/notificationservice:${{ github.sha }}
          kubectl rollout status deployment/notificationservice --timeout=120s
