name: Deploy UserService
on:
  push:
    branches: [main]
    paths: ['UserService/**']
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: cd UserService && mvn clean package -DskipTests

      - name: List target folder
        run: ls UserService/target/

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./UserService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/userservice:latest

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            # 1. Navigate to the working directory on the VPS
            cd ~/services/userservice
            
            # 2. Generate the .env file with keys matching docker-compose.yml
            # and values mapping to your GitHub Secrets.
            echo "SERVER_PORT=${{ secrets.USERSERVICE_SERVER_PORT }}" > .env
            echo "SPRING_DATASOURCE_URL=${{ secrets.USERSERVICE_DATASOURCE_URL }}" >> .env
            echo "SPRING_DATASOURCE_USERNAME=${{ secrets.USERSERVICE_DATASOURCE_USERNAME }}" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.USERSERVICE_DATASOURCE_PASSWORD }}" >> .env
            echo "SPRING_JPA_HIBERNATE_DDL_AUTO=${{ secrets.USERSERVICE_JPA_DDL_AUTO }}" >> .env
            echo "EUREKA=${{ secrets.USERSERVICE_EUREKA }}" >> .env
            echo "EUREKA_INSTANCE_HOSTNAME=${{ secrets.USERSERVICE_EUREKA_HOSTNAME }}" >> .env
            echo "REDIS_HOST=${{ secrets.USERSERVICE_REDIS_HOST }}" >> .env
            echo "REDIS_PORT=${{ secrets.USERSERVICE_REDIS_PORT }}" >> .env
            
            # 3. Restrict permissions so only root can read the secrets
            chmod 600 .env
            
            # 4. Pull the latest image and do a clean restart
            docker pull stargazingsparrow/userservice:latest
            docker-compose down 
            docker-compose up -d