name: Deploy UserService

on:
  push:
    branches: [main]
    paths: ['UserService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v3

      # ── 2. Java 21 ───────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Build ─────────────────────────────────────────────────
      - name: Build JAR
        run: cd UserService && mvn clean package -DskipTests

      - name: List target folder
        run: ls UserService/target/

      # ── 4. Docker build & push ───────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./UserService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/userservice:latest

      # ── 5. Copy docker-compose to VPS ────────────────────────────
      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "UserService/docker-compose.yml"
          target: "~/services/userservice"
          strip_components: 1

      # ── 6. Write .env, pull image, restart ───────────────────────
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/services/userservice

            # ${{ secrets.* }} is expanded by the Actions runner BEFORE
            # the script is sent over SSH, so double quotes are correct here.
            printf '%s\n' \
              "SERVER_PORT=${{ secrets.USERSERVICE_SERVER_PORT }}" \
              "SPRING_DATASOURCE_URL=${{ secrets.USERSERVICE_DATASOURCE_URL }}" \
              "SPRING_DATASOURCE_USERNAME=${{ secrets.USERSERVICE_DATASOURCE_USERNAME }}" \
              "SPRING_DATASOURCE_PASSWORD=${{ secrets.USERSERVICE_DATASOURCE_PASSWORD }}" \
              "SPRING_JPA_HIBERNATE_DDL_AUTO=${{ secrets.USERSERVICE_JPA_DDL_AUTO }}" \
              "EUREKA=${{ secrets.USERSERVICE_EUREKA }}" \
              "EUREKA_INSTANCE_HOSTNAME=${{ secrets.USERSERVICE_EUREKA_HOSTNAME }}" \
              "REDIS_HOST=${{ secrets.USERSERVICE_REDIS_HOST }}" \
              "REDIS_PORT=${{ secrets.USERSERVICE_REDIS_PORT }}" \
              > .env

            chmod 600 .env

            docker pull stargazingsparrow/userservice:latest
            docker-compose down
            docker-compose up -d