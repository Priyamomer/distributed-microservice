name: Deploy PaymentService

on:
  push:
    branches: [main]
    paths: ['PaymentService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build JAR
        run: cd PaymentService && mvn clean package -DskipTests
      - name: List target folder
        run: ls PaymentService/target/
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ./PaymentService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/paymentservice:latest
      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "PaymentService/docker-compose.yml"
          target: "~/services/paymentservice"
          strip_components: 1
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd ~/services/paymentservice
            printf '%s\n' \
              "SERVER_PORT=${{ secrets.PAYMENTSERVICE_SERVER_PORT }}" \
              "SPRING_DATASOURCE_URL=${{ secrets.PAYMENTSERVICE_DATASOURCE_URL }}" \
              "SPRING_DATASOURCE_USERNAME=${{ secrets.PAYMENTSERVICE_DATASOURCE_USERNAME }}" \
              "SPRING_DATASOURCE_PASSWORD=${{ secrets.PAYMENTSERVICE_DATASOURCE_PASSWORD }}" \
              "EUREKA=${{ secrets.PAYMENTSERVICE_EUREKA_URL }}" \
              "EUREKA_INSTANCE_HOSTNAME=${{ secrets.PAYMENTSERVICE_EUREKA_HOSTNAME }}" \
              "JWK_URI=${{ secrets.PAYMENTSERVICE_JWK_URI }}" \
              "ISSUER_URI=${{ secrets.PAYMENTSERVICE_ISSUER_URI }}" \
              > .env
            chmod 600 .env
            docker pull stargazingsparrow/paymentservice:latest
            docker-compose down
            docker-compose up -d