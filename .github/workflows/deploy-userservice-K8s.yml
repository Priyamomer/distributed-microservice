name: Deploy UserService K8s

on:
  push:
    branches: [main]
    paths: ['UserService/**']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v3

      # ── 2. Java 21 ───────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 3. Build ─────────────────────────────────────────────────
      - name: Build JAR
        run: cd UserService && mvn clean package -DskipTests

      - name: List target folder
        run: ls UserService/target/

      # ── 4. Docker build & push ───────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: ./UserService
          platforms: linux/amd64
          push: true
          tags: stargazingsparrow/userservice:${{ github.sha }}

      # ── 5. Configure kubectl ─────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── 6. Sync secrets to k8s ───────────────────────────────────
      - name: Sync secrets to k8s
        run: |
          kubectl create secret generic userservice-secrets \
            --from-literal=db-username=${{ secrets.USERSERVICE_DATASOURCE_USERNAME }} \
            --from-literal=db-password=${{ secrets.USERSERVICE_DATASOURCE_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── 7. Deploy ────────────────────────────────────────────────
      - name: Deploy to k8s
        run: |
          kubectl apply -f k8s/userservice.yaml
          kubectl set image deployment/userservice \
            userservice=stargazingsparrow/userservice:${{ github.sha }}
          kubectl rollout status deployment/userservice --timeout=120s