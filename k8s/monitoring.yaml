# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring

---
# ── Prometheus ConfigMap (scrape config) ─────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'userservice'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['userservice.default.svc.cluster.local:8200']

      - job_name: 'productservice'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['productservice.default.svc.cluster.local:8300']

      - job_name: 'cartservice'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['cartservice.default.svc.cluster.local:8400']

      - job_name: 'orderservice'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['orderservice.default.svc.cluster.local:8500']

      - job_name: 'paymentservice'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['paymentservice.default.svc.cluster.local:8600']

      - job_name: 'notificationservice'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['notificationservice.default.svc.cluster.local:8700']

      - job_name: 'gateway'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['gateway.default.svc.cluster.local:8000']

---
# ── Prometheus Deployment ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
# ── Prometheus Service ────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30900
  type: NodePort

---
# ── Grafana Deployment ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin123"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
# ── Grafana Service ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32000
  type: NodePort