# ════════════════════════════════════════════════════════════════
# PAYMENT SERVICE
# kubectl create secret generic paymentservice-secrets \
#   --from-literal=db-username=<user> \
#   --from-literal=db-password=<pass>
# ════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: paymentservice
          image: stargazingsparrow/paymentservice:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8600
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: SERVER_PORT
              value: "8600"
            - name: EUREKA_CLIENT_REGISTER-WITH-EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH-REGISTRY
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://10.0.0.2:3306/paymentservice"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: paymentservice-secrets
                  key: db-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paymentservice-secrets
                  key: db-password
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://62.238.15.118:30200"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://62.238.15.118:30200/oauth2/jwks"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "10.0.0.2:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: paymentservice
spec:
  selector:
    app: paymentservice
  ports:
    - port: 8600
      targetPort: 8600
      nodePort: 30600
  type: NodePort
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paymentservice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paymentservice
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
