apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
  labels:
    app: userservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      containers:
        - name: userservice
          image: priyamomer/userservice:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8200
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8200"
            # MySQL on host machine — use host.minikube.internal
            # allowPublicKeyRetrieval + useSSL=false avoids common MySQL 8 handshake errors
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://192.168.65.254:3306/userservice?allowPublicKeyRetrieval=true&useSSL=false"
            - name: SPRING_DATASOURCE_USERNAME
              value: "user99"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password"
            # Disable Eureka in k8s — use k8s DNS for service discovery instead
