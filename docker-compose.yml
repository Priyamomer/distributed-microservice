version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user99
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:latest
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  discoveryservice:
    build: ./DiscoveryService
    container_name: discoveryservice
    ports:
      - "8100:8100"
    environment:
      SERVER_PORT: 8100
      EUREKA_INSTANCE_HOSTNAME: discoveryservice
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discoveryservice:8100/eureka
      EUREKA_CLIENT_REGISTER-WITH-EUREKA: "false"
      EUREKA_CLIENT_FETCH-REGISTRY: "false"

  userservice:
    build: ./UserService
    container_name: userservice
    ports:
      - "8200:8200"
    environment:
      SERVER_PORT: 8200
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userservice
      SPRING_DATASOURCE_USERNAME: user99
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discoveryservice:8100/eureka
      EUREKA_INSTANCE_HOSTNAME: userservice
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      discoveryservice:
        condition: service_started

  productservice:
    build: ./ProductService
    container_name: productservice
    ports:
      - "8300:8300"
    environment:
      SERVER_PORT: 8300
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/productservice
      SPRING_DATASOURCE_USERNAME: user99
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://userservice:8200/oauth2/jwks
      RESOURCE_SERVER: http://userservice:8200
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discoveryservice:8100/eureka
      EUREKA_INSTANCE_HOSTNAME: productservice
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      discoveryservice:
        condition: service_started
      userservice:
        condition: service_started

  gateway:
    build: ./Gateway
    container_name: gateway
    ports:
      - "8000:8000"
    environment:
      SERVER_PORT: 8000
      SPRING_APPLICATION_NAME: Gateway
      EUREKA_INSTANCE_HOSTNAME: gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discoveryservice:8100/eureka
      EUREKA_CLIENT_REGISTER-WITH-EUREKA: "true"
      EUREKA_CLIENT_FETCH-REGISTRY: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_PROVIDER: my-provider
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_CLIENT-ID: GW2
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_CLIENT-SECRET: GW2Secret
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_AUTHORIZATION-GRANT-TYPE: authorization_code
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_SCOPE: openid
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GATEWAY_REDIRECT-URI: http://localhost:8000/login/oauth2/code/gateway
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_MY-PROVIDER_ISSUER-URI: http://userservice:8200
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_MY-PROVIDER_AUTHORIZATION-URI: http://localhost:8200/oauth2/authorize
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_MY-PROVIDER_TOKEN-URI: http://userservice:8200/oauth2/token
    depends_on:
      - discoveryservice
      - userservice

volumes:
  mysql_data:
  redis_data: